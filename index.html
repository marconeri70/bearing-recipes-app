<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ricette Lavorazione Cuscinetti - Terminale di Linea</title>

  <link rel="stylesheet" href="styles.css" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="theme-color" content="#050816" />
</head>
<body>

  <div id="kiosk-lock-screen" class="kiosk-overlay">
    <div class="numpad-container">
      <div class="kiosk-header">
        <h2>Terminale di Linea</h2>
        <p>Inserisci PIN Operatore</p>
      </div>
      
      <div class="pin-display">
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
        <div class="pin-dot" id="dot-4"></div>
      </div>

      <div class="numpad-grid">
        <button class="num-btn" data-val="1">1</button>
        <button class="num-btn" data-val="2">2</button>
        <button class="num-btn" data-val="3">3</button>
        <button class="num-btn" data-val="4">4</button>
        <button class="num-btn" data-val="5">5</button>
        <button class="num-btn" data-val="6">6</button>
        <button class="num-btn" data-val="7">7</button>
        <button class="num-btn" data-val="8">8</button>
        <button class="num-btn" data-val="9">9</button>
        <button class="num-btn action-btn btn-clear" id="btn-clear">C</button>
        <button class="num-btn" data-val="0">0</button>
        <button class="num-btn action-btn enter-btn" id="btn-enter">OK</button>
      </div>
    </div>
  </div>

  <div id="app-content" style="display: none;">
    
    <header class="app-header">
      <h1>Ricette Lavorazione</h1>
      <p id="operator-info-display">Identificazione in corso...</p>
    </header>

    <main class="app-main">
      <section class="card card-lavorazioni">
        <div class="card-header">
          <div>
            <h2>Lavorazioni</h2>
            <span class="sub"><span id="recipes-count">0</span> ricette approvate</span>
          </div>
          <button id="btn-nuova" class="btn btn-primary">➕ Nuova</button>
        </div>

        <div class="toolbar">
          <button id="btn-import" class="btn btn-light">📥 Importa CSV</button>
          <input type="file" id="file-import" accept=".csv" style="display:none" />
          <button id="btn-export-csv" class="btn btn-light">📤 Esporta CSV</button>
        </div>

        <div id="lista-lavorazioni" class="lista-container">
          </div>
      </section>

      <section id="card-form" class="card card-form is-hidden">
        <div class="card-header">
          <h2 id="stato-modifica">Nuova lavorazione</h2>
          <button id="btn-reset" class="btn btn-light">Annulla</button>
        </div>

        <form id="form-lavorazione">
          <div class="form-grid">
            <div class="form-group full">
              <label>Codice Lavorazione</label>
              <input type="text" id="codice" placeholder="es. SKF-7204-C3" required />
            </div>

            <div class="form-group">
              <label>IR Tipo</label>
              <input type="text" id="irTipo" />
            </div>
            <div class="form-group">
              <label>IR Diametro (mm)</label>
              <input type="text" inputmode="decimal" id="irDiametro" placeholder="es. 20,15" />
            </div>
            <div class="form-group">
              <label>OR Tipo</label>
              <input type="text" id="orTipo" />
            </div>
            <div class="form-group">
              <label>Diametro Sfera</label>
              <input type="text" inputmode="decimal" id="diametroSfera" />
            </div>
            <div class="form-group">
              <label>Numero Sfere</label>
              <input type="text" inputmode="numeric" id="numeroSfere" />
            </div>
            <div class="form-group">
              <label>Tipo Gabbia</label>
              <input type="text" id="gabbiaTipo" />
            </div>

            <div class="form-group">
              <label>Tipo Grasso</label>
              <input type="text" id="grassoTipo" />
            </div>
            <div class="form-group">
              <label>Tipo Schermo</label>
              <input type="text" id="schermoTipo" />
            </div>
            <div class="form-group">
              <label>Peso Min (g)</label>
              <input type="text" inputmode="decimal" id="pesoMin" />
            </div>
            <div class="form-group">
              <label>Peso Max (g)</label>
              <input type="text" inputmode="decimal" id="pesoMax" />
            </div>

            <div class="form-group">
              <label>Classe Gioco</label>
              <select id="classeGioco">
                <option value="">Caricamento...</option>
              </select>
            </div>
            <div class="form-group">
              <label>Gioco Min (µm)</label>
              <input type="text" inputmode="decimal" id="giocoMin" />
            </div>
            <div class="form-group">
              <label>Gioco Max (µm)</label>
              <input type="text" inputmode="decimal" id="giocoMax" />
            </div>
          </div>

          <div class="form-group full drawing-section">
            <label>Disegno Tecnico / Foto</label>
            <div class="drawing-controls">
              <input type="text" id="disegnoUrl" placeholder="URL Disegno (Drive, Dropbox...)" />
              <button type="button" id="btn-file-galleria" class="btn btn-light">🖼️ Galleria</button>
              <input type="file" id="file-galleria" accept="image/*" style="display:none" />
            </div>
            <div class="drawing-preview">
              <img id="drawing-image" src="" alt="Anteprima disegno" style="display:none;" />
              <div id="drawing-placeholder">Nessun disegno caricato</div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" id="btn-elimina" class="btn btn-danger" disabled>Elimina</button>
            <button type="button" id="btn-scheda-tecnica" class="btn btn-light" disabled>📄 Scheda</button>
            <button type="submit" class="btn btn-primary">Salva Ricetta</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script type="module" src="js/main.js"></script>

</body>
</html>
