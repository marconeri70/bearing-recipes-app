<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Terminale Ricette Lavorazione</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="kiosk-lock-screen" class="kiosk-overlay">
    <div class="numpad-container">
      <div class="kiosk-header">
        <h2>Terminale di Linea</h2>
        <p>Inserisci PIN Operatore</p>
      </div>
      
      <div class="pin-display">
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
        <div class="pin-dot" id="dot-4"></div>
      </div>

      <div class="numpad-grid">
        <button class="num-btn" data-val="1">1</button>
        <button class="num-btn" data-val="2">2</button>
        <button class="num-btn" data-val="3">3</button>
        <button class="num-btn" data-val="4">4</button>
        <button class="num-btn" data-val="5">5</button>
        <button class="num-btn" data-val="6">6</button>
        <button class="num-btn" data-val="7">7</button>
        <button class="num-btn" data-val="8">8</button>
        <button class="num-btn" data-val="9">9</button>
        <button class="num-btn action-btn btn-clear" id="btn-clear">C</button>
        <button class="num-btn" data-val="0">0</button>
        <button class="num-btn action-btn enter-btn" id="btn-enter">OK</button>
      </div>
    </div>
  </div>

  <div id="app-content" style="display: none;">
    <header class="app-header">
      <h1>Ricette Lavorazione</h1>
      <p id="operator-info-display">In attesa di login...</p>
    </header>

    <main class="app-main">
      <section class="card card-lavorazioni">
        <div class="card-header">
          <div>
            <h2>Lavorazioni (Lotti SKF)</h2>
            <span class="sub"><span id="recipes-count">0</span> ricette approvate</span>
          </div>
          <button id="btn-nuova" class="btn btn-primary">➕ Nuova</button>
        </div>
        </section>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
